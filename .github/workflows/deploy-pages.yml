name: Deploy to GitHub Pages

# Static dashboard, deployed via GitHub Actions (replaces legacy branch-deploy,
# which had no concurrency control and froze the served site on failure).
#
# GitHub Pages' backend intermittently rejects deploys with
#   ##[error]Deployment failed, try again later.
# — a TRANSIENT server-side error, not a config problem. Left unhandled, each one
# fails the run and emails "All jobs have failed". So the deploy step RETRIES:
# a transient rejection self-heals on the next attempt and the run stays green.
# Only 3 consecutive failures (rare) fail the run.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Let an in-progress production deploy COMPLETE (cancelling it mid-deployment
  # can leave Pages in a stuck "in_progress" state that blocks the next run).
  # Queued runs collapse to the latest, so newest content still wins.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://divtrader.github.io/trading-dashboard/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact (whole repo — static files at root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Deploy with retry — a transient "try again later" from Pages self-heals
      # instead of failing the run + emailing Braam.
      - name: Deploy to Pages (attempt 1)
        id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Backoff before attempt 2
        if: steps.d1.outcome == 'failure'
        run: sleep 20
      - name: Deploy to Pages (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Backoff before attempt 3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 45
      - name: Deploy to Pages (attempt 3)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Fail run only if all 3 attempts failed
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure' && steps.d3.outcome == 'failure'
        run: |
          echo "::error::All 3 GitHub Pages deploy attempts failed (transient backend). The next push will redeploy."
          exit 1
